<body class="min-h-screen flex items-center justify-center p-4 md:p-10">

  <main class="w-full max-w-[440px]">

    <div class="text-center mb-10">
      <div class="inline-block p-4 mb-4 rounded-xl bg-white shadow-sm">
        <svg class="w-16 h-16" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="64" height="64" rx="12" fill="#123f3f" />
          <polygon points="32,10 54,22 32,28 10,22" fill="#a3cfce" />
          <rect x="29" y="28" width="6" height="12" fill="#7faaaa" />
          <ellipse cx="32" cy="41" rx="9" ry="3.5" fill="#7faaaa" />
          <rect x="16" y="30" width="32" height="20" rx="3" fill="#1a5f6e" opacity="0.85" />
          <rect x="22" y="36" width="20" height="2.5" rx="1" fill="#a3cfce" opacity="0.7" />
          <rect x="22" y="41" width="14" height="2" rx="1" fill="#a3cfce" opacity="0.5" />
        </svg>
      </div>
      <h1 class="text-[28px] md:text-[36px] font-bold text-[#002828] leading-tight tracking-tight mb-2">
        Student Management
      </h1>
      <p class="text-[16px] text-[#404848]">Admin Login</p>
    </div>

    <section class="login-card rounded-xl p-8 md:p-10 border border-[#c0c8c7]/30">

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

        <div class="space-y-2">
          <label class="block text-[14px] font-semibold text-[#404848] tracking-[0.01em]" for="username">
            Username
          </label>
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#717978] text-[20px]">person</span>
            <input id="username" type="text" formControlName="username" placeholder="e.g. admin" required
              class="focus-ring w-full pl-10 pr-4 py-3 bg-white border border-[#c0c8c7] rounded-lg text-[16px] text-[#0b1c30] transition-all placeholder:text-[#717978]" />
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <label class="text-[14px] font-semibold text-[#404848] tracking-[0.01em]" for="password">Password</label>
          </div>
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#717978] text-[20px]">lock</span>
            <input id="password" type="password" formControlName="password" placeholder="••••••••" required
              class="focus-ring w-full pl-10 pr-12 py-3 bg-white border border-[#c0c8c7] rounded-lg text-[16px] text-[#0b1c30] transition-all placeholder:text-[#717978]" />
          </div>
        </div>

        <div *ngIf="errorMsg" class="flex items-center gap-2 p-3 bg-[#ffdad6] border border-[#ba1a1a]/30 rounded-lg">
          <span class="material-symbols-outlined text-[#ba1a1a] text-[18px]">error</span>
          <p class="text-[14px] text-[#93000a]">{{ errorMsg }}</p>
        </div>

        <button type="submit" [disabled]="loginForm.invalid || isLoading"
          class="w-full py-4 bg-[#123f3f] text-white text-[14px] font-semibold tracking-[0.01em] rounded-lg shadow-sm hover:-translate-y-0.5 hover:shadow-md active:scale-95 transition-all duration-200 disabled:opacity-70 disabled:cursor-not-allowed disabled:transform-none flex items-center justify-center gap-2">
          <span *ngIf="isLoading" class="material-symbols-outlined text-[18px] animate-spin">progress_activity</span>
          <span>{{ isLoading ? (isSuccess ? 'Redirecting...' : 'Authenticating...') : 'Login to Dashboard' }}</span>
        </button>

      </form>

    </section>



  </main>
</body>
